<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-wrapper">
        <header class="header">
            <h1>Прогноз погоды по населенным пунктам</h1>
            <div class="search-container">
                <input type="text" id="city-search" placeholder="Поиск города..." autocomplete="off">
                <ul id="search-results" class="hidden"></ul>
            </div>
        </header>
        
        <main class="main-content">
            <div id="map"></div>
        </main>

        <div id="chart-modal" class="modal hidden">
            <div class="modal-content">
                <span id="close-modal" class="close-btn">&times;</span>
                <h2 id="modal-title">Погода</h2>
                <div class="chart-wrapper">
                    <canvas id="weather-chart"></canvas>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
